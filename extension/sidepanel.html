<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><style>body{margin:0;padding:16px;background:#111113;color:#f7f7f8;font:14px system-ui,sans-serif}button{width:100%;margin:6px 0;padding:10px;border:1px solid #334155;background:#18181b;color:#d1fae5}pre{white-space:pre-wrap;font-size:12px;color:#a7f3d0}.card{border:1px solid #27272a;padding:12px;margin:10px 0}</style></head>
  <body>
    <h1>Faust scanner</h1>
    <p>Review source data, profitability, readiness, and publish status before sending anything risky.</p>
    <button id="status-button">Check Faust session</button>
    <button id="register-button">Register / rotate token</button>
    <button id="scan-button">Scan current product</button>
    <button id="import-button">Approve import + create drafts</button>
    <button id="dry-run-button">Dry-run guided publish on current marketplace tab</button>
    <div class="card"><strong>Five-channel readiness</strong><pre id="readiness">No import yet.</pre></div>
    <div class="card"><strong>Result</strong><pre id="output">Idle.</pre></div>
    <script src="sidepanel.js"></script>
  </body>
</html>
