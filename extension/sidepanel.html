<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 14px;
        min-width: 320px;
        background:
          radial-gradient(circle at top right, rgba(86, 98, 127, .32), transparent 245px),
          radial-gradient(circle at bottom left, rgba(47, 58, 85, .18), transparent 270px),
          #09090b;
        color: #f8fafc;
        font: 14px/1.5 Aptos, Inter, "SF Pro Text", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      }
      .shell { border: 1px solid rgba(154,167,194,.16); border-radius: 28px; background: rgba(19,19,22,.92); overflow: hidden; box-shadow: 0 26px 76px rgba(0,0,0,.48), 0 0 46px rgba(47,58,85,.2); }
      .hero { padding: 24px 18px 18px; text-align: center; border-bottom: 1px solid rgba(255,255,255,.08); }
      .hero img { display: block; width: 232px; height: 151px; margin: 0 auto 4px; object-fit: contain; object-position: center; }
      h1 { margin: 0; font-size: 26px; letter-spacing: -.04em; }
      p { margin: 7px 0 0; color: #a1a1aa; }
      .content { padding: 14px; }
      .section-title { margin: 4px 2px 9px; color: #71717a; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .12em; }
      button { width: 100%; margin: 7px 0; padding: 13px 14px; border: 1px solid rgba(154,167,194,.14); border-radius: 18px; background: rgba(36,36,40,.92); color: #f4f4f5; font: inherit; font-weight: 760; cursor: pointer; text-align: left; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
      button.primary { background: linear-gradient(180deg, #56627f, #0f172a); border-color: rgba(154,167,194,.28); color: #f8fafc; text-align: center; box-shadow: 0 12px 32px rgba(47,58,85,.34); }
      button:hover { filter: brightness(1.06); }
      button:disabled { opacity: .55; cursor: wait; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .grid button { text-align: center; margin: 0; padding: 12px 10px; }
      .card { border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 13px; margin: 12px 0; background: #111114; }
      .card strong { display: block; margin-bottom: 8px; color: #e5e7eb; letter-spacing: -.01em; }
      #status { color: #c8d2e6; font-size: 12px; min-height: 18px; }
      pre { white-space: pre-wrap; margin: 0; font-size: 12px; color: #d4d4d8; }
      details { margin-top: 12px; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; background: #0d0d10; padding: 11px 12px; }
      summary { cursor: pointer; color: #a1a1aa; font-size: 12px; font-weight: 800; }
      #output { margin-top: 10px; max-height: 260px; overflow: auto; color: #eef3ff; font-size: 11px; }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <img src="assets/faust-logo.png" alt="Faust Snow Leopard" />
        <h1>Faust OS</h1>
        <p>Import a source product and continue the review in Faust.</p>
      </section>
      <section class="content">
        <p class="section-title">Source product</p>
        <button id="import-button" class="primary">Import to Faust</button>
        <button id="scan-button">Preview scan only</button>

        <div class="card">
          <strong>Review</strong>
          <pre id="readiness">No product scanned yet.</pre>
        </div>

        <p class="section-title">Marketplace listing</p>
        <div class="grid">
          <button id="dry-run-button">Preview fill</button>
          <button id="fill-button">Fill form</button>
        </div>

        <p class="section-title">Connection</p>
        <div class="grid">
          <button id="status-button">Check</button>
          <button id="register-button">Connect</button>
        </div>

        <div class="card">
          <strong>Status</strong>
          <p id="status" role="status">Ready.</p>
        </div>

        <details>
          <summary>Technical details</summary>
          <pre id="output">No details yet.</pre>
        </details>
      </section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
