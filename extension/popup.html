<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 320px; margin: 0; padding: 18px; background: #111113; color: #f7f7f8; font: 14px/1.4 Inter, ui-sans-serif, system-ui, sans-serif; }
      h1 { margin: 0; font-size: 17px; }
      p { margin: 6px 0 16px; color: #a1a1aa; }
      button { width: 100%; border: 0; border-radius: 9px; padding: 11px 14px; color: white; background: #7c3aed; font: inherit; font-weight: 600; cursor: pointer; margin-top: 8px; }
      button:disabled { opacity: .55; cursor: wait; }
      #status { min-height: 20px; margin: 12px 0 0; color: #c4b5fd; font-size: 12px; }
      pre { white-space: pre-wrap; max-height: 180px; overflow: auto; color: #d1fae5; font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>Faust Bridge</h1>
    <p>Scan Superbuy / 1688, review profitability, then create Faust drafts.</p>
    <button id="scan-product">Scan + Analyze</button>
    <button id="import-product">Approve Import</button>
    <button id="open-options">Settings</button>
    <p id="status" role="status"></p>
    <pre id="summary"></pre>
    <script src="popup.js"></script>
  </body>
</html>
