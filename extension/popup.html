<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        background:
          radial-gradient(circle at top right, rgba(190, 242, 100, .2), transparent 180px),
          linear-gradient(180deg, #151518, #09090b);
        color: #f8fafc;
        font: 14px/1.45 Aptos, Inter, "SF Pro Text", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      }
      .shell { border: 1px solid rgba(255,255,255,.09); border-radius: 26px; background: rgba(19,19,22,.88); overflow: hidden; box-shadow: 0 22px 60px rgba(0,0,0,.38); }
      .hero { padding: 22px 18px 18px; text-align: center; border-bottom: 1px solid rgba(255,255,255,.08); }
      .hero img { display: block; width: 88px; height: 88px; margin: 0 auto 14px; border-radius: 28px; object-fit: cover; border: 1px solid rgba(255,255,255,.12); box-shadow: 0 0 36px rgba(190,242,100,.18); }
      h1 { margin: 0; font-size: 24px; letter-spacing: -.04em; }
      p { margin: 7px 0 0; color: #a1a1aa; }
      .content { padding: 14px; }
      button { width: 100%; border: 0; border-radius: 18px; padding: 13px 14px; color: #07110d; background: #bef264; font: inherit; font-weight: 800; cursor: pointer; margin-top: 9px; }
      button.secondary { color: #e5e7eb; background: #242428; border: 1px solid rgba(255,255,255,.08); }
      button:disabled { opacity: .55; cursor: wait; }
      #status { min-height: 20px; margin: 12px 2px 0; color: #bef264; font-size: 12px; }
      #summary { margin: 10px 0 0; white-space: pre-wrap; color: #d4d4d8; font-size: 12px; }
      details { margin-top: 12px; border: 1px solid rgba(255,255,255,.08); border-radius: 16px; background: #101014; padding: 10px 12px; }
      summary { cursor: pointer; color: #a1a1aa; font-size: 12px; font-weight: 700; }
      pre { white-space: pre-wrap; max-height: 180px; overflow: auto; color: #a7f3d0; font-size: 11px; }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <img src="assets/faust-logo.png" alt="Faust logo" />
        <h1>Faust Bridge</h1>
        <p>Scan products and send clean drafts to Faust.</p>
      </section>
      <section class="content">
        <button id="scan-product">Scan product</button>
        <button id="import-product" class="secondary">Import to Faust</button>
        <button id="open-options" class="secondary">Settings</button>
        <p id="status" role="status">Ready.</p>
        <pre id="summary"></pre>
        <details>
          <summary>Technical details</summary>
          <pre id="raw-output">No details yet.</pre>
        </details>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
