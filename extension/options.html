<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        max-width: 620px;
        margin: 0 auto;
        padding: 28px;
        background:
          radial-gradient(circle at top right, rgba(125, 211, 252, .3), transparent 270px),
          radial-gradient(circle at bottom left, rgba(56, 189, 248, .16), transparent 260px),
          #09090b;
        color: #f8fafc;
        font: 14px/1.5 Aptos, Inter, "SF Pro Text", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      }
      .panel { border: 1px solid rgba(186,230,253,.16); border-radius: 30px; background: rgba(19,19,22,.92); padding: 24px; box-shadow: 0 26px 76px rgba(0,0,0,.48), 0 0 46px rgba(56,189,248,.2); }
      .brand { text-align: center; margin-bottom: 22px; }
      .brand img { width: 124px; height: 124px; padding: 6px; border-radius: 36px; object-fit: contain; object-position: center; border: 1px solid rgba(186,230,253,.18); background: rgba(9,9,11,.38); box-shadow: 0 18px 48px rgba(0,0,0,.4), 0 0 40px rgba(125,211,252,.24); }
      h1 { margin: 14px 0 0; font-size: 26px; letter-spacing: -.04em; }
      p { color: #a1a1aa; }
      label { display: block; margin: 14px 0; color: #e5e7eb; font-weight: 700; }
      input, select { width: 100%; box-sizing: border-box; margin-top: 8px; padding: 13px 14px; border-radius: 18px; background: #111114; color: #fff; border: 1px solid rgba(186,230,253,.14); font: inherit; font-weight: 400; }
      button { width: 100%; margin-top: 14px; padding: 13px 16px; border-radius: 18px; background: linear-gradient(180deg, #7dd3fc, #0f172a); color: #f8fafc; border: 0; font: inherit; font-weight: 850; box-shadow: 0 12px 32px rgba(56,189,248,.34); }
      #status { color: #bae6fd; }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="brand">
        <img src="assets/faust-logo.png" alt="Faust logo" />
        <h1>Faust Bridge settings</h1>
        <p>Choose which Faust workspace this browser connects to.</p>
      </div>
      <label>Faust URL <input id="faustBaseUrl" /></label>
      <label>Browser name <input id="deviceName" /></label>
      <label>Environment <select id="environment"><option value="local">local</option><option value="staging">staging</option><option value="production">production</option></select></label>
      <p>No marketplace passwords are stored. Faust uses your active browser sessions only.</p>
      <button id="save">Save settings</button>
      <p id="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
